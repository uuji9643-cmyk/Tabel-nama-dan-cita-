<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Data Cita-Cita Siswa - Semua Pengguna</title>
    <style>
        * {margin:0;padding:0;box-sizing:border-box;}
        body {
            font-family:system-ui,-apple-system,sans-serif;
            background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            min-height:100vh;padding:15px;
            line-height:1.4;
        }
        .container {
            background:rgba(255,255,255,0.95);
            border-radius:15px;
            box-shadow:0 15px 35px rgba(0,0,0,0.2);
            overflow:hidden;
            max-width:100%;
        }
        .header {
            background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%);
            color:white;
            padding:25px;
            text-align:center;
        }
        .header h1 {font-size:1.8em;margin-bottom:8px;}
        .header p {opacity:0.9;font-size:0.95em;}
        
        .controls {
            padding:25px;
            background:#f8f9ff;
            display:flex;
            flex-direction:column;
            gap:15px;
        }
        .input-group {
            display:flex;
            gap:10px;
            background:white;
            padding:15px;
            border-radius:12px;
            box-shadow:0 8px 25px rgba(0,0,0,0.1);
        }
        input[type="text"], input[type="password"] {
            flex:1;
            border:none;
            outline:none;
            padding:12px 15px;
            border-radius:8px;
            background:#f0f2ff;
            font-size:16px;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            background:white;
            box-shadow:0 0 0 2px rgba(79,172,254,0.4);
        }
        .btn {
            padding:12px 20px;
            border:none;
            border-radius:8px;
            font-size:15px;
            font-weight:600;
            cursor:pointer;
            transition:all 0.3s;
        }
        .btn-primary {
            background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%);
            color:white;
            flex-shrink:0;
            min-width:120px;
        }
        .btn-primary:hover:not(:disabled),
        .btn-primary:active:not(:disabled) {
            transform:translateY(-2px);
            box-shadow:0 10px 20px rgba(79,172,254,0.4);
        }
        .btn-primary:disabled{opacity:0.6;cursor:not-allowed;}
        
        .btn-admin {
            background:linear-gradient(135deg,#ffd23f 0%,#ff9800 100%);
            color:#333;
            font-weight:700;
        }
        .btn-danger {
            background:linear-gradient(135deg,#ff6b6b 0%,#ee5a52 100%);
            color:white;
            font-size:14px;
            padding:8px 15px;
        }
        .btn-success {
            background:linear-gradient(135deg,#51cf66 0%,#40c057 100%);
            color:white;
        }
        .btn-secondary {
            background:#6c757d;
            color:white;
            padding:10px 15px;
            font-size:14px;
        }
        
        .search-filter {
            display:flex;
            gap:10px;
            flex-wrap:wrap;
        }
        .search-filter input {
            min-width:200px;
        }
        .search-filter select {
            padding:12px 15px;
            border-radius:8px;
            background:#f0f2ff;
            border:none;
            font-size:16px;
        }
        
        .admin-panel {
            display:none;
            background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            padding:20px;
            margin:15px;
            border-radius:12px;
            color:white;
        }
        .admin-panel.active{display:block;}
        .admin-panel h3{margin-bottom:15px;}
        .admin-hint {
            background:rgba(255,255,255,0.2);
            padding:10px;
            border-radius:8px;
            font-size:13px;
            margin-top:10px;
        }
        
        .table-container {
            padding:25px;
            overflow-x:auto;
        }
        table {
            width:100%;
            border-collapse:collapse;
            background:white;
            border-radius:12px;
            overflow:hidden;
            box-shadow:0 8px 25px rgba(0,0,0,0.1);
            min-width:600px;
        }
        th,td {
            padding:15px 12px;
            text-align:left;
            border-bottom:1px solid #e1e8ff;
        }
        th {
            background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%);
            color:white;
            font-weight:600;
            font-size:13px;
            text-align:center;
            position:sticky;
            top:0;
            z-index:10;
        }
        tr:hover{background:#f8f9ff;}
        tr td:nth-child(1){text-align:center;font-weight:600;width:50px;}
        tr td:nth-child(2){font-weight:600;color:#2c3e50;}
        tr td:nth-child(3){color:#667eea;font-style:italic;}
        tr td:nth-child(4){font-size:13px;color:#7f8c8d;width:140px;}
        
        .empty-state {
            text-align:center;
            padding:50px 20px;
            color:#999;
        }
        .empty-state div{font-size:3.5em;margin-bottom:15px;opacity:0.5;}
        
        .stats {
            display:flex;
            gap:15px;
            margin-bottom:25px;
            flex-wrap:wrap;
        }
        .stat-card {
            background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            color:white;
            padding:18px;
            border-radius:12px;
            flex:1;
            text-align:center;
            min-width:140px;
        }
        .stat-number {
            font-size:2em;
            font-weight:bold;
            margin-bottom:5px;
        }
        
        .pagination {
            display:flex;
            justify-content:center;
            gap:10px;
            margin-top:25px;
            flex-wrap:wrap;
        }
        .pagination button {
            padding:10px 15px;
            min-width:45px;
        }
        .pagination .page-info {
            padding:12px 20px;
            background:#f8f9ff;
            border-radius:8px;
            font-weight:600;
            color:#2c3e50;
        }
        
        .notification {
            position:fixed;
            top:15px;
            right:15px;
            padding:15px 20px;
            border-radius:8px;
            color:white;
            font-weight:600;
            z-index:1000;
            transform:translateX(350px);
            transition:all 0.4s;
            box-shadow:0 8px 25px rgba(0,0,0,0.3);
            max-width:90vw;
        }
        .notification.show{transform:translateX(0);}
        .notification.success{background:#51cf66;}
        .notification.error{background:#ff6b6b;}
        
        @media (max-width:480px) {
            .input-group,.search-filter{flex-direction:column;}
            input[type="text"]{width:100%;}
            .stats{flex-direction:column;}
            th,td{padding:12px 8px;font-size:14px;}
            .pagination{flex-direction:column;align-items:center;}
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Data Cita-Cita Semua Siswa</h1>
            <p>✅ Semua pengguna bisa melihat semua data! ✨</p>
        </div>

        <div class="controls">
            <!-- Form Tambah Data -->
            <div class="input-group">
                <input type="text" id="namaInput" placeholder="👤 Nama Siswa" maxlength="25">
                <input type="text" id="citaInput" placeholder="💭 Cita-Cita" maxlength="35">
                <button class="btn btn-primary" id="tambahBtn" onclick="tambahData()" disabled>
                    ➕ SIMPAN
                </button>
            </div>

            <!-- Search & Filter -->
            <div class="input-group search-filter">
                <input type="text" id="searchInput" placeholder="🔍 Cari nama atau cita-cita...">
                <select id="sortSelect">
                    <option value="terbaru">📅 Terbaru</option>
                    <option value="terlama">📅 Terlama</option>
                    <option value="nama">👤 A-Z</option>
                </select>
                <button class="btn btn-secondary" onclick="clearFilter()">🔄 Reset</button>
            </div>

            <button class="btn btn-admin" onclick="toggleAdmin()">
                🔐 ADMIN PANEL
            </button>
        </div>

        <div id="adminPanel" class="admin-panel">
            <h3>🔧 Panel Admin</h3>
            <div style="display:flex;gap:10px;flex-wrap:wrap;">
                <input type="text" id="adminNama" placeholder="Nama Siswa" style="flex:1;min-width:150px;padding:12px;">
                <input type="text" id="adminCita" placeholder="Cita-Cita" style="flex:1;min-width:180px;padding:12px;">
                <button class="btn btn-success" onclick="tambahDataAdmin()">✅ Tambah</button>
                <button class="btn btn-danger" onclick="hapusSemuaData()">🗑️ Hapus Semua</button>
            </div>
            <div class="admin-hint">
                🔑 Password: <strong>1234</strong><br>
                📱 Semua data tersimpan permanen di browser semua pengguna!
            </div>
        </div>

        <div class="table-container">
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalData">0</div>
                    Total Siswa
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="namaTerbanyak">-</div>
                    Nama Terpopuler
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="dataTertampil">0</div>
                    Data Tertampil
                </div>
            </div>
            
            <table>
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Nama</th>
                        <th>Cita-Cita</th>
                        <th>Tanggal</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>

            <!-- Pagination -->
            <div class="pagination" id="pagination" style="display:none;">
                <button class="btn btn-secondary" id="prevBtn" onclick="changePage(-1)">⬅️ Prev</button>
                <div class="page-info" id="pageInfo"></div>
                <button class="btn btn-secondary" id="nextBtn" onclick="changePage(1)">Next ➡️</button>
            </div>
        </div>
    </div>

    <script>
        let dataSiswa = JSON.parse(localStorage.getItem('dataSiswa')) || [];
        const ADMIN_PASSWORD = '1234';
        
        // Pagination settings
        let currentPage = 1;
        const itemsPerPage = 10;
        let filteredData = [];

        // 🚀 INISIALISASI
        document.addEventListener('DOMContentLoaded', () => {
            renderTable();
            updateStats();
            setupInputListener();
            setupSearchListener();
        });

        // 🎯 AUTO ENABLE BUTTON
        function setupInputListener() {
            const inputs = [document.getElementById('namaInput'), document.getElementById('citaInput')];
            inputs.forEach(input => {
                input.addEventListener('input', checkFormValid);
            });
        }

        function checkFormValid() {
            const nama = document.getElementById('namaInput').value.trim();
            const cita = document.getElementById('citaInput').value.trim();
            document.getElementById('tambahBtn').disabled = !(nama && cita);
        }

        // 🔍 SEARCH & FILTER
        function setupSearchListener() {
            const searchInput = document.getElementById('searchInput');
            const sortSelect = document.getElementById('sortSelect');
            
            searchInput.addEventListener('input', filterData);
            sortSelect.addEventListener('change', filterData);
        }

        function filterData() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const sortBy = document.getElementById('sortSelect').value;
            
            filteredData = dataSiswa.filter(s => 
                s.nama.toLowerCase().includes(searchTerm) || 
                s.cita.toLowerCase().includes(searchTerm)
            );

            // Sort data
            switch (sortBy) {
                case 'terlama':
                    filteredData.sort((a, b) => a.id - b.id);
                    break;
                case 'nama':
                    filteredData.sort((a, b) => a.nama.localeCompare(b.nama));
                    break;
                default:
                    filteredData.sort((a, b) => b.id - a.id);
            }

            currentPage = 1;
            renderTable();
            updateStats();
        }

        function clearFilter() {
            document.getElementById('searchInput').value = '';
            document.getElementById('sortSelect').value = 'terbaru';
            filteredData = [...dataSiswa];
            currentPage = 1;
            renderTable();
            updateStats();
        }

        // ➕ TAMBAH DATA USER
        function tambahData() {
            const nama = document.getElementById('namaInput').value.trim();
            const cita = document.getElementById('citaInput').value.trim();
            
            if (!nama || !cita) {
                showNotif('❌ Lengkapi data!', 'error');
                return;
            }
            
            const siswa = {
                id: Date.now() + Math.random(),
                nama: nama.charAt(0).toUpperCase() + nama.slice(1),
                cita: cita.charAt(0).toUpperCase() + cita.slice(1),
                tanggal: new Date().toLocaleString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })
            };
            
            dataSiswa.unshift(siswa);
            localStorage.setItem('dataSiswa', JSON.stringify(dataSiswa));
            
            document.getElementById('namaInput').value = '';
            document.getElementById('citaInput').value = '';
            document.getElementById('tambahBtn').disabled = true;
            
            filterData();
            showNotif('✅ Data tersimpan! Semua pengguna bisa lihat!', 'success');
        }

        // Pagination functions
        function getTotalPages() {
            return Math.ceil(filteredData.length / itemsPerPage);
        }

        function changePage(direction) {
            const totalPages = getTotalPages();
            currentPage += direction;
            if (currentPage < 1) currentPage = 1;
            if (currentPage > totalPages) currentPage = totalPages;
            renderTable();
        }

        // ➕ TAMBAH ADMIN
        function tambahDataAdmin() {
            const nama = document.getElementById('adminNama').value.trim();
            const cita = document.getElementById('adminCita').value.trim();
            
            if (!nama || !cita) return showNotif('❌ Lengkapi data admin!', 'error');
            
            const siswa = {
                id: Date.now() + Math.random(),
                nama: nama.charAt(0).toUpperCase() + nama.slice(1),
                cita: cita.charAt(0).toUpperCase() + cita.slice(1),
                tanggal: new Date().toLocaleString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })
            };
            
            dataSiswa.unshift(siswa);
            localStorage.setItem('dataSiswa', JSON.stringify(dataSiswa));
            
            document.getElementById('adminNama').value = '';
            document.getElementById('adminCita').value = '';
            filterData();
            showNotif('🔧 Data admin tersimpan untuk semua pengguna!', 'success');
        }

        // 🗑️ HAPUS SATU
        function hapusData(id) {
            if (confirm('🗑️ Yakin hapus data ini?')) {
                dataSiswa = dataSiswa.filter(s => s.id !== id);
                localStorage.setItem('dataSiswa', JSON.stringify(dataSiswa));
                filterData();
                showNotif('✅ Data dihapus!', 'success');
            }
        }

        // 🗑️ HAPUS SEMUA
        function hapusSemuaData() {
            if (confirm('⚠️ HAPUS SEMUA DATA SISWA?\n(Tidak bisa dikembalikan!)')) {
                dataSiswa = [];
                localStorage.setItem('dataSiswa', JSON.stringify(dataSiswa));
                filterData();
                showNotif('🗑️ SEMUA DATA DIHAPUS!', 'error');
            }
        }

        // 🔐 ADMIN LOGIN
        function toggleAdmin() {
            const pass = prompt('🔐 Masukkan Password Admin:', '');
            
            if (pass === ADMIN_PASSWORD) {
                document.getElementById('adminPanel').classList.toggle('active');
                const isActive = document.getElementById('adminPanel').classList.contains('active');
                show
