<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Cita-Cita</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .header {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
        }

        .nav-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .nav-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .nav-btn.active {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
        }

        .content {
            padding: 40px;
            min-height: 400px;
        }

        .form-section {
            max-width: 500px;
            margin: 0 auto 40px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.6s ease forwards;
        }

        @keyframes slideUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        input, textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: scale(1.02);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: linear-gradient(45deg, #ff6b6b, #ee5a52);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.4);
        }

        .table-container {
            overflow-x: auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th, td {
            padding: 20px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            font-weight: bold;
            position: sticky;
            top: 0;
        }

        tr {
            transition: all 0.3s ease;
        }

        tr:hover {
            background: #f8f9fa;
            transform: scale(1.01);
        }

        .admin-section {
            background: #fff3cd;
            border: 2px solid #ffeaa7;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .password-input {
            max-width: 200px;
            margin: 0 auto 20px;
        }

        .success-msg, .error-msg {
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-weight: bold;
            transform: scale(0.9);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .success-msg {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error-msg {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .show {
            transform: scale(1);
            opacity: 1;
        }

        .delete-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: #ff6b6b;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: #ee5a52;
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            .nav {
                flex-direction: column;
                align-items: center;
            }
            
            .content {
                padding: 20px;
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌟 Daftar Cita-Cita 🌟</h1>
            <p>Tulis cita-citamu dan jadilah inspirasi!</p>
        </div>

        <div class="nav">
            <button class="nav-btn active" onclick="showSection('user')">👤 User</button>
            <button class="nav-btn" onclick="showSection('admin')">🔧 Admin</button>
        </div>

        <div class="content">
            <!-- User Section -->
            <div id="user-section">
                <div class="form-section">
                    <h2 style="text-align: center; margin-bottom: 20px; color: #333;">📝 Tambah Cita-Cita</h2>
                    <div class="form-group">
                        <label for="userName">Nama Lengkap:</label>
                        <input type="text" id="userName" placeholder="Masukkan nama lengkap Anda" required>
                    </div>
                    <div class="form-group">
                        <label for="userDream">Cita-Cita:</label>
                        <textarea id="userDream" placeholder="Tuliskan cita-cita Anda di sini..." required></textarea>
                    </div>
                    <button class="btn btn-primary" onclick="addUserEntry()">🚀 Tambah Cita-Cita</button>
                    <div id="userMessage"></div>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>No</th>
                                <th>👤 Nama</th>
                                <th>💭 Cita-Cita</th>
                                <th>📅 Ditambahkan</th>
                            </tr>
                        </thead>
                        <tbody id="dataTable">
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Admin Section -->
            <div id="admin-section" class="hidden">
                <div class="admin-section">
                    <h2 style="text-align: center; color: #856404;">🔐 Masuk Admin</h2>
                    <div class="form-group password-input">
                        <input type="password" id="adminPassword" placeholder="Password Admin" maxlength="4">
                    </div>
                    <button class="btn btn-primary" onclick="loginAdmin()" style="max-width: 200px; margin: 0 auto; display: block;">Masuk</button>
                    <div id="adminMessage"></div>
                </div>

                <div id="adminPanel" class="hidden">
                    <div style="text-align: center; margin-bottom: 30px;">
                        <h2 style="color: #856404;">🛠️ Panel Admin</h2>
                        <button class="btn btn-danger" onclick="clearAllData()">🗑️ Hapus Semua Data</button>
                    </div>

                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>No</th>
                                    <th>👤 Nama</th>
                                    <th>💭 Cita-Cita</th>
                                    <th>📅 Ditambahkan</th>
                                    <th>⚡ Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="adminTable">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Data storage menggunakan localStorage
        let data = JSON.parse(localStorage.getItem('dreamData')) || [];
        let isAdminLoggedIn = localStorage.getItem('adminLoggedIn') === 'true';

        const ADMIN_PASSWORD = '1234'; // Password admin: 1234

        // Inisialisasi
        document.addEventListener('DOMContentLoaded', function() {
            renderTable();
            updateNav();
            if (isAdminLoggedIn) {
                showSection('admin');
                document.getElementById('adminPanel').classList.remove('hidden');
            }
        });

        function showSection(section) {
            // Hide all sections
            document.getElementById('user-section').classList.add('hidden');
            document.getElementById('admin-section').classList.add('hidden');
            
            // Show selected section
            if (section === 'user') {
                document.getElementById('user-section').classList.remove('hidden');
                document.querySelector('.nav-btn').classList.remove('active');
                event.target.classList.add('active');
            } else {
                document.getElementById('admin-section').classList.remove('hidden');
                document.querySelectorAll('.nav-btn')[1].classList.add('active');
            }
        }

        function addUserEntry() {
            const name = document.getElementById('userName').value.trim();
            const dream = document.getElementById('userDream').value.trim();

            if (!name || !dream) {
                showMessage('userMessage', 'Mohon isi semua field!', 'error');
                return;
            }

            // Cek apakah user sudah pernah input
            const existingUser = data.find(entry => entry.name.toLowerCase() === name.toLowerCase());
            if (existingUser) {
                showMessage('userMessage', 'Nama ini sudah ada! Satu orang hanya boleh input sekali.', 'error');
                return;
            }

            // Tambah data baru
            const newEntry = {
                id: Date.now(),
                name: name,
                dream: dream,
                timestamp: new Date().toLocaleString('id-ID')
            };

            data.unshift(newEntry);
            localStorage.setItem('dreamData', JSON.stringify(data));
            
            // Reset form
            document.getElementById('userName').value = '';
            document.getElementById('userDream').value = '';
            
            showMessage('userMessage', '✅ Cita-cita berhasil ditambahkan!', 'success');
            renderTable();
            
            // Animasi sukses
            document.querySelector('.form-section').style.animation = 'none';
            setTimeout(() => {
                document.querySelector('.form-section').style.animation = 'slideUp 0.6s ease';
            }, 10);
        }

        function renderTable(admin = false) {
            const tableBody = admin ? document.getElementById('adminTable') : document.getElementById('dataTable');
            tableBody.innerHTML = '';

            data.forEach((entry, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${entry.name}</td>
                    <td>${entry.dream}</td>
                    <td>${entry.timestamp}</td>
                    ${admin ? `<td><button class="delete-btn" onclick="deleteEntry(${entry.id})">Hapus</button></td>` : ''}
                `;
                tableBody.appendChild(row);
            });
        }

        function deleteEntry(id) {
            if (confirm('Yakin ingin menghapus data ini?')) {
                data = data.filter(entry => entry.id !== id);
                localStorage.setItem('dreamData', JSON.stringify(data));
                renderTable(true);
                showMessage('adminMessage', '✅ Data berhasil dihapus!', 'success');
            }
        }

        function clearAllData() {
            if (confirm('Yakin ingin menghapus SEMUA data? Ini tidak bisa dibatalkan!')) {
                data = [];
                localStorage.setItem('dreamData', JSON.stringify(data));
                renderTable(true);
                showMessage('adminMessage', '🗑️ Semua data berhasil dihapus!', 'success');
            }
        }

        function loginAdmin() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                isAdminLoggedIn = true;
                localStorage.setItem('adminLoggedIn', 'true');
                document.getElementById('adminPanel').classList.remove('hidden');
                document.querySelector('.admin-section').style.display = 'none';
                renderTable(true);
                showMessage('adminMessage', '✅ Login admin berhasil!', 'success');
            } else {
                showMessage('adminMessage', '❌ Password salah!', 'error');
            }
        }

        function showMessage(elementId, message, type) {
            const messageEl = document.getElementById(elementId);
            messageEl.textContent = message;
            messageEl.className = `${type}-msg show`;
            setTimeout(() => {
                messageEl.classList.remove('show');
            }, 3000);
        }

        function updateNav() {
            const buttons = document.querySelectorAll('.nav-btn');
            buttons.forEach((btn, index) => {
                btn.classList.toggle('active', index === 0);
            });
        }

        // Enter key support
        document.getElementById('userName').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addUserEntry();
        });

        document.getElementById('userDream').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) addUserEntry();
        });

        document.getElementById('adminPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') loginAdmin();
        });
    </script>
</body>
</html>
